<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Facturas</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    button { margin: 20px 0; padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Listado de Facturas</h1>
  <button onclick="cargarFacturas()">Cargar Facturas</button>
  <table id="tabla">
    <thead>
      <tr>
        <th>Número</th>
        <th>Cliente</th>
        <th>Monto</th>
        <th>IVA</th>
      </tr>
    </thead>
    <tbody id="cuerpo"></tbody>
  </table>

  <script>
    async function cargarFacturas() {
      const res = await fetch("/facturas");   // URL relativa, misma API
      const facturas = await res.json();

      const cuerpo = document.getElementById("cuerpo");
      cuerpo.innerHTML = "";                  // limpia antes de renderizar

      facturas.forEach(f => {
        const fila = `
          <tr>
            <td>${f.numero}</td>
            <td>${f.cliente}</td>
            <td>$${f.monto.toFixed(2)}</td>
            <td>${f.iva ? "Sí" : "No"}</td>
          </tr>`;
        cuerpo.innerHTML += fila;
      });
    }

    // Carga automática al abrir la página
    cargarFacturas();
  </script>
</body>
</html>
